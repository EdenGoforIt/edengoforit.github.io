services:
  site:
    image: ruby:3.3-alpine
    working_dir: /site
    command: sh -c "apk add --no-cache build-base && bundle install && bundle exec jekyll serve --host 0.0.0.0 --port 4000 --livereload"
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/site
      - bundle-cache:/usr/local/bundle
    environment:
      JEKYLL_ENV: development

volumes:
  bundle-cache:

